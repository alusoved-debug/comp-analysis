services:
  - type: web
    name: fault-analysis-bot
    runtime: python
    region: frankfurt
    plan: free
    branch: demo-fault-bot
    rootDir: DemoClaude
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
